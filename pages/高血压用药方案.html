<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高血压药物全信息对比管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:#f5f7fa;font-family:Microsoft YaHei,sans-serif}
  .drug-card{transition:.3s;border:1px solid #e2e8f0}
  .drug-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
  /* 分类标签 */
  .tag-ccb{background:#dbeafe;color:#1e40af}
  .tag-acei{background:#fef3c7;color:#92400e}
  .tag-arb{background:#d1fae5;color:#065f46}
  .tag-diuretic{background:#fee2e2;color:#991b1b}
  .tag-beta{background:#f3e8ff;color:#6b21a8}
  .tag-other{background:#e5e7eb;color:#374151}
  /* 标记标签 */
  .tag-use{background:#10b981;color:#fff}
  .tag-caution{background:#f59e0b;color:#fff}
  .tag-avoid{background:#ef4444;color:#fff}
  .badge{font-size:12px;padding:2px 6px;border-radius:4px;margin-right:4px;display:inline-block;margin-bottom:4px}
  .text-small{font-size:13px;line-height:1.5}
  .filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .comp-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .mark-btn.active{opacity:1;font-weight:700}
  .side-tag{background:#f9fafb;border:1px solid #e5e7eb;padding:1px 4px;border-radius:3px;font-size:12px;margin:0 2px 2px 0;display:inline-block}

</head>
<body class="min-h-screen pb-20">
<div class="container mx-auto px-4 py-6 max-w-7xl">
  <!-- 头部 -->
  <div class="mb-6">

    <p class="text-red-500 text-xs mt-2">【重要声明】本工具仅为用药参考，不替代医嘱，严禁自行调药、停药！</p>
  </div>

  <!-- 筛选区 -->
  <div class="bg-white rounded-xl p-5 mb-6 shadow-sm">
    <div class="mb-3">
      <p class="text-sm text-gray-600 mb-2">药物分类筛选：</p>
      <div class="flex flex-wrap gap-2">

        <button class="filter-btn px-3 py-1 border rounded text-sm" data-type="ACEI">ACEI普利类</button>
        <button class="filter-btn px-3 py-1 border rounded text-sm" data-type="ARB">ARB沙坦类</button>
        <button class="filter-btn px-3 py-1 border rounded text-sm" data-type="利尿剂">利尿剂</button>
        <button class="filter-btn px-3 py-1 border rounded text-sm" data-type="β受体阻滞剂">β受体阻滞剂</button>
        <button class="filter-btn px-3 py-1 border rounded text-sm" data-type="其他">其他特殊药</button>
      </div>
    </div>
    <div class="mb-3">
      <p class="text-sm text-gray-600 mb-2">并发症适配筛选：</p>
      <div class="flex flex-wrap gap-2">
        <button class="comp-btn px-3 py-1 border rounded text-sm active" data-comp="all">全部并发症</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="冠心病">冠心病</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="心衰">心力衰竭</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="糖尿病肾病">糖尿病肾病</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="慢性肾病">慢性肾病</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="脑卒中">脑卒中后</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="痛风">痛风</button>
        <button class="comp-btn px-3 py-1 border rounded text-sm" data-comp="房颤">房颤</button>
      </div>
    </div>
    <input id="searchInput" placeholder="搜索药名/原研/禁忌/副作用" class="w-full px-3 py-2 border rounded mt-2">
  </div>

  <!-- 操作区 -->
  <div class="flex flex-wrap gap-3 mb-6">
    <button id="exportBtn" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">导出用药方案</button>
    <button id="clearMark" class="px-4 py-2 bg-gray-500 text-white rounded text-sm">清空所有标记</button>
  </div>

  <!-- 药物卡片 -->
  <div id="drugContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  <!-- 导出弹窗 -->
  <div id="exportModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl w-full max-w-3xl max-h-[80vh] overflow-auto p-6 mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-xl">高血压药物全信息方案</h3>
        <button id="closeModal" class="text-gray-500 text-2xl">×</button>
      </div>
      <textarea id="exportContent" class="w-full h-72 p-3 border rounded text-sm" readonly></textarea>
      <div class="flex gap-3 mt-4 justify-end">
        <button id="copyBtn" class="px-4 py-2 bg-blue-600 text-white rounded text-sm">复制方案</button>
        <button id="downloadBtn" class="px-4 py-2 bg-gray-700 text-white rounded text-sm">下载TXT</button>
      </div>
    </div>
  </div>
</div>

// 全局状态
let currentFilter = {type:"all",comp:"all",keyword:""};
let userMarks = JSON.parse(localStorage.getItem("drugFullMarks")) || {};

// 渲染卡片
function renderDrugs(){
  const container = document.getElementById("drugContainer");
  let filtered = drugData.filter(d=>{
    if(currentFilter.type!=="all"&&d.type!==currentFilter.type)return false;
    if(currentFilter.comp!=="all"&&!d.complication.includes(currentFilter.comp))return false;
    if(currentFilter.keyword&&!d.name.includes(currentFilter.keyword)&&!d.brand.includes(currentFilter.keyword)&&!d.taboo.includes(currentFilter.keyword)&&!d.side.includes(currentFilter.keyword))return false;
    return true;
  });
  container.innerHTML = "";
  filtered.forEach(d=>{
    const mark = userMarks[d.name]||"";
    const sideTags = d.side.split(/、|，/).map(s=>`<span class="side-tag">${s}</span>`).join('');
    container.innerHTML += `
      <div class="drug-card bg-white rounded-xl p-5 shadow-sm">
        <div class="mb-3">
          <span class="badge tag-${d.type.toLowerCase()}">${d.type}</span>
          <span class="text-sm text-gray-500 float-right">${d.brand} | ${d.company}</span>
        </div>
        <h3 class="text-xl font-bold mb-2 text-gray-800">${d.name}</h3>
        <div class="text-small mb-2">
          <p class="text-gray-700 mb-1"><strong>适配并发症：</strong>${d.complication}</p>
          <p class="text-red-600 mb-1"><strong>禁忌人群：</strong>${d.taboo}</p>
          <p class="text-gray-700 mb-1"><strong>用药建议：</strong>${d.advice}</p>
          <div class="text-gray-600"><strong>副作用：</strong>${sideTags}</div>
        </div>
        <div class="flex gap-2 mt-3 border-t pt-3">
          <button class="mark-btn px-2 py-1 rounded text-xs ${mark==="use"?"tag-use active":"bg-gray-100 text-gray-700"}" data-name="${d.name}" data-status="use">在用</button>
          <button class="mark-btn px-2 py-1 rounded text-xs ${mark==="caution"?"tag-caution active":"bg-gray-100 text-gray-700"}" data-name="${d.name}" data-status="caution">慎用</button>
          <button class="mark-btn px-2 py-1 rounded text-xs ${mark==="avoid"?"tag-avoid active":"bg-gray-100 text-gray-700"}" data-name="${d.name}" data-status="avoid">禁用</button>
        </div>
      </div>`;
  });
  bindMark();
}

// 绑定标记事件
function bindMark(){
  document.querySelectorAll(".mark-btn").forEach(b=>{
    b.onclick=()=>{
      const name = b.dataset.name;
      const s = b.dataset.status;
      userMarks[name] = userMarks[name]===s?"":s;
      localStorage.setItem("drugFullMarks",JSON.stringify(userMarks));
      renderDrugs();
    }
  });
}

// 绑定筛选事件
function bindFilter(){
  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentFilter.type = b.dataset.type;
      renderDrugs();
    }
  });
  document.querySelectorAll(".comp-btn").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll(".comp-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentFilter.comp = b.dataset.comp;
      renderDrugs();
    }
  });
  document.getElementById("searchInput").oninput=e=>{
    currentFilter.keyword = e.target.value.trim();
    renderDrugs();
  }
}

// 绑定导出功能
function bindExport(){
  const m = document.getElementById("exportModal");
  document.getElementById("exportBtn").onclick=()=>{
    let t = "高血压药物全信息对比方案\n生成时间："+new Date().toLocaleString()+"\n\n===== 个人用药标记 =====\n";
    Object.keys(userMarks).forEach(name=>{
      const d = drugData.find(x=>x.name===name);
      if(d){
        const st = {use:"【在用】",caution:"【慎用】",avoid:"【禁用】"}[userMarks[name]]||"";
        t+=`${st}${d.name}（${d.type}）\n原研：${d.brand} ${d.company}\n适配：${d.complication}\n建议：${d.advice}\n\n`;
      }
    });
    t+="===== 全药物信息 =====\n";
    drugData.forEach(d=>{
      t+=`【${d.type}】${d.name}\n原研：${d.brand} | ${d.company}\n禁忌：${d.taboo}\n建议：${d.advice}\n副作用：${d.side}\n------------------------\n`;
    });
    t+="\n【重要提示】本方案仅为参考，所有用药需遵心内科医生指导！";
    document.getElementById("exportContent").value = t;
    m.classList.remove("hidden");
  };
  document.getElementById("closeModal").onclick=()=>m.classList.add("hidden");
  document.getElementById("copyBtn").onclick=()=>{
    document.getElementById("exportContent").select();
    document.execCommand("copy");
    alert("已复制到剪贴板");
  };
  document.getElementById("downloadBtn").onclick=()=>{
    const blob = new Blob([document.getElementById("exportContent").value],{type:"text/plain"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="高血压药物全信息方案.txt";
    a.click();
  };
  document.getElementById("clearMark").onclick=()=>{
    if(confirm("确定清空所有用药标记？")){
      userMarks={};
      localStorage.removeItem("drugFullMarks");
      renderDrugs();
    }
  };
}

// 初始化
window.onload=()=>{renderDrugs();bindFilter();bindExport();}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>财务自由联动分析仪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 布局控制 */
        .dashboard { display: flex; flex-direction: column; gap: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .input-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        /* 图表容器 */
        .chart-container { position: relative; height: 350px; width: 100%; margin: 20px 0; }

        /* 表格微调 */
        .table-scroll { overflow-x: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: right; }
        .free-row { background-color: #e8f5e9 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">数据联动：资产收益 vs 生活成本</h2>
    
    <div class="input-grid">
        <div class="input-group"><label>起始年薪 (¥)</label><input type="number" id="startSalary" value="150000"></div>
        <div class="input-group"><label>薪资增长 (%)</label><input type="number" id="growthRate" value="8"></div>
        <div class="input-group"><label>月开销 (¥)</label><input type="number" id="monthlySpend" value="6000"></div>
        <div class="input-group"><label>年化收益 (%)</label><input type="number" id="returnRate" value="10"></div>
    </div>

    <div class="chart-container">
        <canvas id="financeChart"></canvas>
    </div>

    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th>年</th>
                    <th>税前年薪</th>
                    <th>年结余</th>
                    <th>资产收益 (被动)</th>
                    <th>年生活成本 (总)</th>
                    <th>总资产累计</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let myChart; // 存储图表实例

    function initChart() {
        const ctx = document.getElementById('financeChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: '年资产收益 (¥)',
                        data: [],
                        backgroundColor: '#27ae60',
                        order: 2
                    },
                    {
                        label: '年生活成本 (¥)',
                        data: [],
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        borderWidth: 2,
                        type: 'line', // 将支出设为折线，方便对比
                        fill: false,
                        pointRadius: 0,
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, ticks: { callback: v => '¥' + v/10000 + '万' } }
                }
            }
        });
    }

    function calculate() {
        // 获取输入
        const salary = parseFloat(document.getElementById('startSalary').value) || 0;
        const growth = (parseFloat(document.getElementById('growthRate').value) || 0) / 100;
        const spendY = (parseFloat(document.getElementById('monthlySpend').value) || 0) * 12;
        const returns = (parseFloat(document.getElementById('returnRate').value) || 0) / 100;

        const labels = [];
        const gainData = [];
        const spendData = [];
        let totalAssets = 0;
        let currentSalary = salary;
        let tableHtml = '';

        for (let i = 1; i <= 25; i++) {
            if (i > 1) currentSalary *= (1 + growth);
            
            const savings = (currentSalary * 0.8) - spendY; // 简单扣除20%税费
            const currentGain = totalAssets * returns;
            totalAssets += (savings + currentGain);

            // 收集图表数据
            labels.push(`第${i}年`);
            gainData.push(Math.round(currentGain));
            spendData.push(spendY);

            // 构建表格
            const isFree = currentGain >= spendY;
            tableHtml += `<tr class="${isFree ? 'free-row' : ''}">
                <td style="text-align:center">${i}</td>
                <td>¥${Math.round(currentSalary).toLocaleString()}</td>
                <td>¥${Math.round(savings).toLocaleString()}</td>
                <td style="color:green">¥${Math.round(currentGain).toLocaleString()}</td>
                <td style="color:red">¥${Math.round(spendY).toLocaleString()}</td>
                <td><b>¥${Math.round(totalAssets).toLocaleString()}</b></td>
            </tr>`;
        }

        // 更新表格内容
        document.getElementById('tableBody').innerHTML = tableHtml;

        // 更新图表数据
        myChart.data.labels = labels;
        myChart.data.datasets[0].data = gainData;
        myChart.data.datasets[1].data = spendData;
        myChart.update('none'); // 使用 'none' 模式可以让联动更平滑，不卡顿
    }

    // 初始化和监听
    window.onload = () => {
        initChart();
        calculate();
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });
    };
</script>

</body>
</html>
